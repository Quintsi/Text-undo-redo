<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Text Undo/Redo</title>
</head>
<body>
    <main>
        <h1>Text History</h1><br>
        <p>Write something below, and as you type it will be saved</p>

        <textarea name="text-body" id="userWriting"></textarea>
        
        <div id="buttons">
            <button id="undo">Undo</button>
            <button id="redo">Redo</button>
        </div>
        
    </main>

<script src="index.js" type="module"></script>    
</body>
</html>
